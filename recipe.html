<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>🍳간장계란 볶음밥 레시피</title>
</head>
<body>

    <header>
        <h1>🍳간장 계란 볶음밥</h1>
    
        <img src="https://static.wtable.co.kr/image/production/service/recipe/1789/390edb81-65b8-478c-adc5-087382d1cc62.jpg" alt="완성된 계란 볶음밥 이미지" width="100">
    
    </header>
    <hr> <section>
   <main>
            <h2>재료</h2>
            <caption>🍽️ 인분 선택</caption> <br>
            <form action="">
              <select name="" id="">
                <option value="">1인분</option>
                <option value="">2인분</option>
                <option value="">4인분</option>
              </select>
              <input type="button" value="적용">
            </form>
            
            <table border="1">
                <caption></caption>
                <thead>
                    <tr>
                        <th>재료</th>
                        <th>양</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>밥</td>
                        <td>1공기</td>
                    </tr>
                    <tr>
                        <td>계란</td>
                        <td>2개</td>
                    </tr>
                    <tr>
                        <td>간장</td>
                        <td>2큰술</td>
                    </tr>
                </tbody>
            </table>
        </section>
    
        <hr> <div>
            <h2>조리 순서</h2>
            
            <ol>
                <li>팬을 중불 <span>(180°C)</span>로 예열합니다.</li>
                <li>계란을 잘 풀어 팬에서 먼저 볶아줍니다.</li>
                <li>밥을 넣고 계란과 잘 섞이도록 충분히 볶습니다.</li>
                <li>간장을 넣고 <span>2분</span> 더 볶아 마무리합니다.</li>
            </ol>
        </div>
    
        <p>
            <a href="https://www.youtube.com" target="_blank">▶️ 유튜브 영상</a>
   </main> <hr>

</body>
</html>
